        body {

            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Bagian Header Tema Kemenkeu */
        .header {
            background-color: #002B5B; /* Biru Dongker Kemenkeu */
            width: 100%;
            padding: 25px 0;
            text-align: center;
            color: #F9A826; /* Kuning Emas */

            background-color: #ffffff;
            border-left: 6px solid #F9A826;
            padding: 25px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #333333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .btn-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            background-color: #fcfcfc;
        }

        .btn-title {
            font-size: 20px;
            font-weight: bold;
            color: #002B5B;
            margin-bottom: 10px;
        }

        .btn-desc {
            font-size: 14px;

</head>
